<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />

		<title>E-commerce - Home | As Melhores Ofertas em Tecnologia</title>

		<!-- Fonts -->
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com" />
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
			rel="stylesheet" />

		<!-- Stylesheet -->
		<link
			rel="stylesheet"
			href="../css/main.css" />
    </head>
    <body>
        <!-- Header / Navigation -->
		<header class="header">
			<div class="header__container">
				<!-- Logo -->
				<a
					href="index.html"
					class="header__logo">
					<svg
						class="header__logo-icon"
						viewBox="0 0 40 40"
						fill="none"
						xmlns="http://www.w3.org/2000/svg">
						<rect
							width="40"
							height="40"
							rx="8"
							fill="currentColor" />
						<path
							d="M12 20L18 26L28 14"
							stroke="white"
							stroke-width="3"
							stroke-linecap="round"
							stroke-linejoin="round" />
					</svg>
					<span>TechShop</span>
				</a>

				<!-- Menu Toggle (Mobile) -->
				<button
					class="header__menu-toggle"
					aria-label="Menu">
					<span class="header__menu-toggle-bar"></span>
					<span class="header__menu-toggle-bar"></span>
					<span class="header__menu-toggle-bar"></span>
				</button>

				<!-- Navigation -->
				<nav class="header__nav">
					<ul class="header__menu">
						<li class="header__menu-item">
							<a
								href="index.html"
								class="header__menu-link"
								>Home</a
							>
						</li>
						<li class="header__menu-item">
							<a
								href="products.html"
								class="header__menu-link"
								>Produtos</a
							>
						</li>
						<li class="header__menu-item">
							<a
								href="#ofertas"
								class="header__menu-link"
								>Ofertas</a
							>
						</li>
						<li class="header__menu-item">
							<a
								href="#contato"
								class="header__menu-link"
								>Contato</a
							>
						</li>
					</ul>

					<!-- Actions -->
					<div class="header__actions">
						<button
							class="header__icon-btn-active"
							data-login-btn
							aria-label="Login" disabled>
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round">
								<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
								<circle
									cx="12"
									cy="7"
									r="4"></circle>
							</svg>
						</button>
						<button
							class="header__icon-btn"
							data-cart-btn
							aria-label="Carrinho">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round">
								<circle
									cx="9"
									cy="21"
									r="1"></circle>
								<circle
									cx="20"
									cy="21"
									r="1"></circle>
								<path
									d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
							</svg>
							<span class="header__cart-badge">0</span>
						</button>
					</div>
				</nav>

				<!-- Overlay for mobile menu -->
				<div class="header__overlay"></div>
			</div>
		</header>
        <main class="main-content container">
            <div class="modal__header">
                <h3 class="modal__title">Login</h3>
                <a href="register.html" class="btn btn-outline">Cadastrar</a>
            </div>
            <div class="modal__body">
                <form class="form" id="loginForm">
                    <div class="form__group">
                        <label class="form__label form__label--required" for="email">E-mail</label>
                        <input type="email" id="email" name="email" class="form__input" placeholder="seu@email.com" required>
                    </div>
                    <div class="form__group">
                        <label class="form__label form__label--required" for="password">Senha</label>
                        <input type="password" id="password" name="password" class="form__input" placeholder="••••••••" required minlength="6">
                    </div>
                    <div class="form__group">
                        <div class="form__checkbox">
                            <input type="checkbox" id="remember" name="remember">
                            <label class="form__checkbox-label" for="remember">Lembrar-me</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal__footer">
                <button class="btn btn-gost">Esqueci a senha</button>
                <button class="btn btn-ghost">Cancelar</button>
                <button class="btn btn-primary">Entrar</button>
            </div>
        </main>
        <!-- Scripts -->
		<!-- Modules -->
		<script src="../js/modules/modal.js"></script>
		<script src="../js/modules/form-validator.js"></script>
		<script src="../js/modules/navigation.js"></script>
		<script src="../js/modules/utils.js"></script>
		<script src="../js/modules/products-gallery.js"></script>
		<script src="../js/modules/handlers.js"></script>
		<!-- Data & App -->
		<script src="../js/products.js"></script>
		<script src="../js/app.js"></script>
    </body>
</html>
